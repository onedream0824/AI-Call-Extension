<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Call Assistant</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true"></span>
      <div class="brand-text">
        <h1>AI Call Assistant</h1>
        <p class="subtitle">Interview support sidebar</p>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" id="btn-settings" class="btn btn-ghost" title="Settings">Settings</button>
      <button type="button" id="btn-run" class="btn btn-primary" title="Capture & send (hotkey)">Capture</button>
    </div>
  </header>

  <section class="status-bar" id="status-bar" data-status="idle">
    <span class="status-dot"></span>
    <span class="status-label" id="status-label">Ready</span>
  </section>

  <main class="main">
    <article class="card card-caption">
      <h2 class="card-title">Captured caption</h2>
      <p class="card-body empty" id="caption-text">Press your hotkey or Capture to fetch the latest live caption.</p>
    </article>

    <article class="card card-response">
      <h2 class="card-title">AI response</h2>
      <div class="response-wrap" id="response-wrap">
        <p class="card-body empty" id="response-text">Your backend response will appear here.</p>
      </div>
    </article>

    <section class="history" id="history-section" hidden>
      <div class="history-header">
        <h2 class="card-title">Session history</h2>
        <button type="button" id="btn-clear" class="btn btn-ghost btn-sm">Clear</button>
      </div>
      <ul class="history-list" id="history-list"></ul>
    </section>
  </main>

  <footer class="footer">
    <kbd id="hotkey-hint">Ctrl+Shift+Y</kbd>
    <span>to capture &amp; send</span>
  </footer>

  <script type="module" src="panel.js"></script>
</body>
</html>
