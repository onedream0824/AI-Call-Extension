<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Call Assistant</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true"></span>
      <div class="brand-text">
        <h1>AI Call Assistant</h1>
        <p class="subtitle">Interview support sidebar</p>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" id="btn-settings" class="btn btn-ghost" title="Settings">Settings</button>
      <button type="button" id="btn-run" class="btn btn-primary" title="Capture & send (hotkey)">Capture</button>
    </div>
  </header>

  <section class="thread-bar" aria-label="Interview threads">
    <button type="button" id="btn-new-thread" class="thread-new" title="New interview">+</button>
    <div class="thread-scroll" id="thread-list" role="tablist"></div>
  </section>

  <section class="status-bar" id="status-bar" data-status="idle">
    <span class="status-dot"></span>
    <span class="status-label" id="status-label">Ready</span>
  </section>

  <main class="main">
    <section class="conversation" id="conversation" aria-label="Thread history">
      <p class="conversation-empty" id="conversation-empty">Select an interview thread or create a new one.</p>
    </section>
  </main>

  <footer class="footer">
    <kbd id="hotkey-hint">Ctrl+Shift+Y</kbd>
    <span>to capture &amp; send</span>
  </footer>

  <dialog class="modal" id="new-thread-modal" aria-labelledby="modal-title">
    <form id="new-thread-form" class="modal-form">
      <header class="modal-header">
        <h2 id="modal-title">New interview</h2>
        <button type="button" class="modal-close" id="btn-modal-close" aria-label="Close">&times;</button>
      </header>

      <div class="modal-body">
        <label class="field">
          <span>Interview title <em>(optional)</em></span>
          <input type="text" id="thread-title" placeholder="e.g. Acme Corp — Senior Developer" maxlength="120" />
        </label>

        <label class="field">
          <span>Resume <em>(PDF or DOCX, required)</em></span>
          <div class="file-drop" id="resume-drop">
            <input type="file" id="resume-file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" required />
            <p class="file-drop-label" id="resume-label">Choose file or drag here</p>
            <p class="file-drop-name" id="resume-name" hidden></p>
          </div>
          <p class="field-error" id="resume-error" hidden></p>
        </label>

        <label class="field">
          <span>Job description <em>(required)</em></span>
          <textarea id="job-description" rows="6" placeholder="Paste the job posting, requirements, and key details…" required></textarea>
          <p class="field-error" id="job-error" hidden></p>
        </label>
      </div>

      <footer class="modal-footer">
        <button type="button" class="btn btn-ghost" id="btn-modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btn-modal-submit">Create interview</button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="panel.js"></script>
</body>
</html>
